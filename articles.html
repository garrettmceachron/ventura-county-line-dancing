<script>


function changeArticleType(type) {
const getArticleType = document.getElementsByClassName("articleType");
const getArticleDiv = document.getElementsByClassName("articleDiv");
const getArticleLineBreak = document.getElementsByClassName("articleLineBreak");


var i = 0;


if (type == "allArticles") {
	while (i < document.querySelectorAll(".timeSince").length) {
	
	
		getArticleDiv[i].style.display = "block";
		getArticleLineBreak[i].style.display = "block";

	i++;
	}
	return;
}

if (type == "venueNews") {
	while (i < document.querySelectorAll(".timeSince").length) {

	if (getArticleType[i].innerHTML != "&nbsp; Venue News") {
		getArticleDiv[i].style.display = "none";
		getArticleLineBreak[i].style.display = "none";
	}
	else {
		getArticleDiv[i].style.display = "block";
		getArticleLineBreak[i].style.display = "block";

	}	
	
	
	i++;
	}
	return;

}

if (type == "siteNews") {
	while (i < document.querySelectorAll(".timeSince").length) {

	if (getArticleType[i].innerHTML != "&nbsp; Site News") {
		getArticleDiv[i].style.display = "none";
		getArticleLineBreak[i].style.display = "none";
	}
	else {
		getArticleDiv[i].style.display = "block";
		getArticleLineBreak[i].style.display = "block";

	}	
	
	
	i++;
	}
	return;

}

if (type == "eventNews") {
	while (i < document.querySelectorAll(".timeSince").length) {

	if (getArticleType[i].innerHTML != "&nbsp; Event News") {
		getArticleDiv[i].style.display = "none";
		getArticleLineBreak[i].style.display = "none";
	}
	else {
		getArticleDiv[i].style.display = "block";
		getArticleLineBreak[i].style.display = "block";

	}	
	
	
	i++;
	}
	return;

}




}



const classToModify = document.getElementsByClassName("timeSince");
var i = 0;




while (i < document.querySelectorAll(".timeSince").length) {


var noSuffixClassToModify;

noSuffixClassToModify = classToModify[i].innerHTML.replace("nd", "");
noSuffixClassToModify = noSuffixClassToModify.replace("th", "");
noSuffixClassToModify = noSuffixClassToModify.replace("rd", "");
noSuffixClassToModify = noSuffixClassToModify.replace("&nbsp;", "");
noSuffixClassToModify = noSuffixClassToModify.replace("st,", ",");
noSuffixClassToModify = noSuffixClassToModify.replace("Augu", "August");




const currentDate = new Date();
var articleDate = Date.parse(noSuffixClassToModify);
var convertedArticleDate = Math.floor(articleDate / (1000 * 60 * 60 * 24));


var currentMilisecondsDate = Date.parse(currentDate)  - "25200000";
var convertedcurrentMiliseconds = Math.floor(currentMilisecondsDate / (1000 * 60 * 60 * 24));

var timeBetweenArticles = convertedcurrentMiliseconds - convertedArticleDate;

if (timeBetweenArticles < 7 && timeBetweenArticles > 1) {
classToModify[i].innerHTML = timeBetweenArticles + " days ago" + "&nbsp";
i++;
continue;
}

if (timeBetweenArticles == 1) {
classToModify[i].innerHTML = timeBetweenArticles + " day ago" + "&nbsp";
i++;
continue;
}


if (timeBetweenArticles == 0) {
classToModify[i].innerHTML = "Posted Today&nbsp";
i++;
continue;
}


if (timeBetweenArticles >= 7 && timeBetweenArticles < 14) {
classToModify[i].innerHTML = "1 week ago" + "&nbsp";
i++;
continue;
}

if (timeBetweenArticles >= 14 && timeBetweenArticles < 21) {
classToModify[i].innerHTML = "2 weeks ago" + "&nbsp";
i++;
continue;
}

if (timeBetweenArticles >= 21 && timeBetweenArticles < 29) {
classToModify[i].innerHTML = "3 weeks ago" + "&nbsp";
i++;
continue;
}


i++;
}






</script>
