	 function NearMe() {
	map.locate({setView: true, maxZoom: 13});
	map.on('locationfound', onLocationFound);
	}
	
	
	
	function onLocationFound(e) {
    var radius = e.accuracy;

    var youAreHereMarker = L.marker(e.latlng, {icon: redIcon}).addTo(map)
        .bindPopup("You are here").openPopup();


    L.circle(e.latlng, radius).addTo(map);
}

var weekly = L.layerGroup().addTo(map);

var monthly = L.layerGroup().addTo(map);

var random = L.layerGroup().addTo(map);

var showHideAll = 1;

var showHideWeekly = 1;

var showHideMonthly = 1;

var showHideRandom = 1;

function showMonthly() {
if (showHideMonthly == 0) {
map.addLayer(monthly);
showHideMonthly = 1;
checkVisibility();
return;
}

if (showHideMonthly == 1) {
map.removeLayer(monthly);
showHideMonthly = 0;
checkVisibility();
return;
}

}

function showRandom() {
if (showHideRandom == 0) {
map.addLayer(random);
showHideRandom = 1;
checkVisibility();
return;
}

if (showHideRandom == 1) {
map.removeLayer(random);
showHideRandom = 0;
checkVisibility();
return;
}

}

function showWeekly() {
if (showHideWeekly == 0) {
map.addLayer(weekly);
showHideWeekly = 1;
checkVisibility();

return;
}

else {
map.removeLayer(weekly);
showHideWeekly = 0;
checkVisibility();
return;
}

}

function showAll() {

	if (showHideWeekly == 0) {
	map.addLayer(weekly);
	showHideWeekly = 1;
	showHideAll = 1;
	
	}

	if (showHideMonthly == 0) {
	map.addLayer(monthly);
	showHideMonthly = 1;
	showHideAll = 1;
	
	
	

	if (showHideRandom == 0) {
	map.addLayer(random);
	showHideRandom = 1;
	showHideAll = 1;
	
	
}

}
checkVisibility();
}

	 function checkVisibility() {
	 if (showHideAll == 1 && showHideMonthly == 1 && showHideWeekly == 1 && showHideRandom == 1)
	 {
		document.getElementById('showingAll').style.display = 'block';
	 }
	 if (showHideAll < 1 || showHideMonthly < 1 || showHideWeekly < 1 || showHideRandom < 1)
	 {
		document.getElementById('showingAll').style.display = 'none';
	 }
	 if (showHideWeekly == 1)
	 {
		document.getElementById('showingWeekly').style.display = 'block';
		document.getElementById('showingAll').style.display = 'none';
		document.getElementById("weekly").checked = true;
	 }
	 else
	 {
		document.getElementById('showingWeekly').style.display = 'none';
		document.getElementById("weekly").checked = false;
	 }
	 if (showHideMonthly == 1)
	 {
		document.getElementById('showingMonthly').style.display = 'block';
		document.getElementById("monthly").checked = true;
	 }
	else
	{
		document.getElementById('showingMonthly').style.display = 'none';
		document.getElementById("monthly").checked = false;	
	}
	if (showHideRandom == 1)
	{
		document.getElementById('showingRandom').style.display = 'block';
		document.getElementById("random").checked = true;
	}
	else
	{
		document.getElementById('showingRandom').style.display = 'none';
		document.getElementById("random").checked = false;
	}
	 }
